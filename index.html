<!DOCTYPE html>
<html>
<head>
  <title>CNCA Neural Map (Canvas Edition)</title>

  <style>
    html, body {
      margin: 0;
      padding: 0;
      overflow: hidden;
      background: #0b0e14;
      font-family: monospace;
    }

    canvas {
      display: block;
    }

    #loading {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      color: #475569;
      font-size: 14px;
    }
  </style>
</head>

<body>
  <div id="loading">Awaiting Neural Data...</div>
  <canvas id="canvas"></canvas>

  <script>
    const canvas = document.getElementById("canvas");
    const ctx = canvas.getContext("2d");

    let nodes = [];
    let edges = [];

    // camera state (pan + zoom)
    let offsetX = 0;
    let offsetY = 0;
    let scale = 1;

    let draggingNode = null;
    let dragOffsetX = 0;
    let dragOffsetY = 0;

    let isPanning = false;
    let lastMouse = { x: 0, y: 0 };

    function resize() {
      canvas.width = window.innerWidth;
      canvas.height = window.innerHeight;
      draw();
    }

    window.addEventListener("resize", resize);
    resize();

    // ---------------------------
    // RECEIVE DATA FROM BUBBLE
    // ---------------------------
    window.addEventListener("message", (event) => {
      const data = event.data;
      if (!data?.nodes) return;

      nodes = data.nodes.map((n, i) => ({
        ...n,
        x: n.position?.x ?? (i % 8) * 200,
        y: n.position?.y ?? Math.floor(i / 8) * 120,
        width: 160,
        height: 50
      }));

      edges = data.edges || [];

      document.getElementById("loading").style.display = "none";
      draw();
    });

    // ---------------------------
    // COORD HELPERS
    // ---------------------------
    function worldToScreen(x, y) {
      return {
        x: x * scale + offsetX,
        y: y * scale + offsetY
      };
    }

    function screenToWorld(x, y) {
      return {
        x: (x - offsetX) / scale,
        y: (y - offsetY) / scale
      };
    }

    function getNodeAt(x, y) {
      const world = screenToWorld(x, y);

      return nodes.find(n =>
        world.x >= n.x &&
        world.x <= n.x + n.width &&
        world.y >= n.y &&
        world.y <= n.y + n.height
      );
    }

    // ---------------------------
    // DRAW LOOP
    // ---------------------------
    function draw() {
      ctx.clearRect(0, 0, canvas.width, canvas.height);

      ctx.save();
      ctx.translate(offsetX, offsetY);
      ctx.scale(scale, scale);

      // edges first
      ctx.strokeStyle = "#3b82f6";
      ctx.lineWidth = 2;

      edges.forEach(e => {
        const source = nodes.find(n => n.id === e.source);
        const target = nodes.find(n => n.id === e.target);
        if (!source || !target) return;

        ctx.beginPath();
        ctx.moveTo(source.x + 80, source.y + 25);
        ctx.lineTo(target.x + 80, target.y + 25);
        ctx.stroke();
      });

      // nodes
      nodes.forEach(n => {
        ctx.fillStyle = "#1e293b";
        ctx.strokeStyle = "#334155";
        ctx.lineWidth = 1;

        ctx.fillRect(n.x, n.y, n.width, n.height);
        ctx.strokeRect(n.x, n.y, n.width, n.height);

        ctx.fillStyle = "#f8fafc";
        ctx.font = "11px monospace";
        ctx.fillText(n.data?.label || n.id, n.x + 10, n.y + 30);
      });

      ctx.restore();
    }

    // ---------------------------
    // INTERACTION
    // ---------------------------
    canvas.addEventListener("mousedown", (e) => {
      const node = getNodeAt(e.clientX, e.clientY);

      if (node) {
        draggingNode = node;
        const world = screenToWorld(e.clientX, e.clientY);

        dragOffsetX = world.x - node.x;
        dragOffsetY = world.y - node.y;
      } else {
        isPanning = true;
        lastMouse = { x: e.clientX, y: e.clientY };
      }
    });

    canvas.addEventListener("mousemove", (e) => {
      if (draggingNode) {
        const world = screenToWorld(e.clientX, e.clientY);

        draggingNode.x = world.x - dragOffsetX;
        draggingNode.y = world.y - dragOffsetY;

        draw();
      }

      if (isPanning) {
        offsetX += e.clientX - lastMouse.x;
        offsetY += e.clientY - lastMouse.y;

        lastMouse = { x: e.clientX, y: e.clientY };

        draw();
      }
    });

    window.addEventListener("mouseup", () => {
      draggingNode = null;
      isPanning = false;
    });

    // zoom
    canvas.addEventListener("wheel", (e) => {
      e.preventDefault();

      const zoomIntensity = 0.001;
      const delta = e.deltaY * -zoomIntensity;

      const mouse = { x: e.clientX, y: e.clientY };

      const world = screenToWorld(mouse.x, mouse.y);

      scale += delta;
      scale = Math.min(Math.max(0.4, scale), 2.5);

      const newScreen = worldToScreen(world.x, world.y);

      offsetX += mouse.x - newScreen.x;
      offsetY += mouse.y - newScreen.y;

      draw();
    }, { passive: false });

    draw();
  </script>
</body>
</html>
