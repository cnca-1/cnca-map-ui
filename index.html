<!DOCTYPE html>
<html>
<head>
  <title>CNCA Neural Map (Canvas Engine)</title>

  <style>
    html, body {
      margin: 0;
      padding: 0;
      overflow: hidden;
      background: #0b0e14;
      font-family: monospace;
    }

    canvas {
      display: block;
    }

    #panel {
      position: absolute;
      right: 0;
      top: 0;
      width: 260px;
      height: 100%;
      background: #0f172a;
      color: white;
      padding: 12px;
      font-size: 12px;
      overflow: auto;
      border-left: 1px solid #1e293b;
    }

    #loading {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      color: #475569;
    }
  </style>
</head>

<body>
  <div id="loading">Awaiting Neural Data...</div>
  <div id="panel">No node selected</div>
  <canvas id="canvas"></canvas>

  <script>
    const canvas = document.getElementById("canvas");
    const ctx = canvas.getContext("2d");

    let nodes = [];
    let edges = [];

    let offsetX = 0;
    let offsetY = 0;
    let scale = 1;

    let draggingNode = null;
    let dragOffsetX = 0;
    let dragOffsetY = 0;

    let isPanning = false;
    let lastMouse = { x: 0, y: 0 };

    function resize() {
      canvas.width = window.innerWidth;
      canvas.height = window.innerHeight;
      draw();
    }
    window.addEventListener("resize", resize);
    resize();

    // simple layout
    function autoLayout(nodes, edges) {
      return nodes.map((n, i) => ({
        ...n,
        x: (i % 10) * 180,
        y: Math.floor(i / 10) * 120,
        width: 160,
        height: 50
      }));
    }

    window.addEventListener("message", (event) => {
      let payload = event.data;

      if (typeof payload === "string") {
        try {
          payload = JSON.parse(payload);
        } catch {
          return;
        }
      }

      let graph = payload.graph;

      if (Array.isArray(graph)) {
        try {
          graph = JSON.parse(graph[0]);
        } catch {
          return;
        }
      }

      if (!graph || !graph.nodes) return;

      edges = graph.edges || [];
      nodes = autoLayout(graph.nodes, edges);

      document.getElementById("loading").style.display = "none";
      draw();
    });

    function screenToWorld(x, y) {
      return {
        x: (x - offsetX) / scale,
        y: (y - offsetY) / scale
      };
    }

    function getNodeAt(x, y) {
      const w = screenToWorld(x, y);

      return nodes.find(n =>
        w.x >= n.x &&
        w.x <= n.x + n.width &&
        w.y >= n.y &&
        w.y <= n.y + n.height
      );
    }

    function getLabel(n) {
      const d = n.data || {};

      return (
        d.name ||                 // ✅ Bubble user-edited name (BEST)
        d.element_name ||         // fallback
        d.elementName ||
        d.custom_name ||
        d.default_name ||
        d.label ||
        n.id
      );
    }

    function draw() {
      ctx.clearRect(0, 0, canvas.width, canvas.height);

      ctx.save();
      ctx.translate(offsetX, offsetY);
      ctx.scale(scale, scale);

      // edges
      ctx.strokeStyle = "#3b82f6";
      ctx.lineWidth = 2;

      edges.forEach(e => {
        const s = nodes.find(n => n.id === e.source);
        const t = nodes.find(n => n.id === e.target);
        if (!s || !t) return;

        const midX = s.x + (t.x - s.x) * 0.5;

        ctx.beginPath();
        ctx.moveTo(s.x + 80, s.y + 25);
        ctx.bezierCurveTo(
          midX, s.y + 25,
          midX, t.y + 25,
          t.x + 80, t.y + 25
        );
        ctx.stroke();
      });

      // nodes
      nodes.forEach(n => {
        ctx.fillStyle = "#1e293b";
        ctx.strokeStyle = "#334155";

        ctx.fillRect(n.x, n.y, n.width, n.height);
        ctx.strokeRect(n.x, n.y, n.width, n.height);

        ctx.fillStyle = "#f8fafc";
        ctx.font = "11px monospace";

        const label = getLabel(n);

        ctx.fillText(label, n.x + 10, n.y + 28);
      });

      ctx.restore();
      drawMiniMap();
    }

    function drawMiniMap() {
      const w = 200, h = 120;

      ctx.save();
      ctx.globalAlpha = 0.9;

      ctx.fillStyle = "#0f172a";
      ctx.fillRect(canvas.width - w - 10, canvas.height - h - 10, w, h);

      const sx = w / 2000;
      const sy = h / 2000;

      ctx.fillStyle = "#3b82f6";

      nodes.forEach(n => {
        ctx.fillRect(
          canvas.width - w - 10 + n.x * sx,
          canvas.height - h - 10 + n.y * sy,
          3, 3
        );
      });

      ctx.restore();
    }

    canvas.addEventListener("mousedown", (e) => {
      const node = getNodeAt(e.clientX, e.clientY);

      if (node) {
        draggingNode = node;

        const w = screenToWorld(e.clientX, e.clientY);
        dragOffsetX = w.x - node.x;
        dragOffsetY = w.y - node.y;
      } else {
        isPanning = true;
        lastMouse = { x: e.clientX, y: e.clientY };
      }
    });

    canvas.addEventListener("mousemove", (e) => {
      if (draggingNode) {
        const w = screenToWorld(e.clientX, e.clientY);
        draggingNode.x = w.x - dragOffsetX;
        draggingNode.y = w.y - dragOffsetY;
        draw();
      }

      if (isPanning) {
        offsetX += e.clientX - lastMouse.x;
        offsetY += e.clientY - lastMouse.y;

        lastMouse = { x: e.clientX, y: e.clientY };
        draw();
      }
    });

    window.addEventListener("mouseup", () => {
      draggingNode = null;
      isPanning = false;
    });

    canvas.addEventListener("wheel", (e) => {
      e.preventDefault();

      const zoom = 0.001;
      const delta = e.deltaY * -zoom;

      const mouse = { x: e.clientX, y: e.clientY };
      const w = screenToWorld(mouse.x, mouse.y);

      scale += delta;
      scale = Math.max(0.4, Math.min(2.5, scale));

      offsetX = mouse.x - w.x * scale;
      offsetY = mouse.y - w.y * scale;

      draw();
    }, { passive: false });

    canvas.addEventListener("click", (e) => {
      const node = getNodeAt(e.clientX, e.clientY);
      if (!node) return;

      document.getElementById("panel").innerHTML = `
        <div style="font-weight:bold;margin-bottom:8px;">${node.id}</div>
        <div style="opacity:0.8;margin-bottom:8px;">${getLabel(node)}</div>
        <pre style="white-space:pre-wrap;color:#94a3b8">
${JSON.stringify(node, null, 2)}
        </pre>
      `;
    });

    draw();
  </script>
</body>
</html>
