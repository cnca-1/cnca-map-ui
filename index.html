<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CNCA Neural Map - Workflow Visualization</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/d3/7.8.5/d3.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-deep: #080a0f;
            --panel-bg: #0d1117;
            --border-muted: #21262d;
            --neon-green: #3fb950;
            --neon-blue: #2f81f7;
            --neon-orange: #d29922;
            --neon-red: #f85149;
            --text-dim: #8b949e;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background-color: var(--bg-deep);
            color: #c9d1d9;
            font-family: 'JetBrains Mono', monospace;
            overflow: hidden;
            height: 100vh;
            text-transform: uppercase;
            font-size: 11px;
            letter-spacing: 0.05em;
        }

        #canvas {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-image: 
                radial-gradient(circle, #161b22 1px, transparent 1px);
            background-size: 30px 30px;
            background-color: var(--bg-deep);
        }

        /* Node styling */
        .node {
            background: var(--panel-bg);
            border: 1px solid var(--border-muted);
            padding: 12px;
            width: 220px;
            position: absolute;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            transition: all 0.2s;
            cursor: pointer;
            z-index: 10;
        }

        .node:hover {
            border-color: var(--text-dim);
            box-shadow: 0 10px 40px rgba(47, 129, 247, 0.2);
        }

        .node.selected {
            border-color: var(--neon-blue);
            box-shadow: 0 0 20px rgba(47, 129, 247, 0.4);
        }

        .node.hotspot {
            border-color: var(--neon-orange);
        }

        .node.hotspot-high {
            border-color: var(--neon-red);
        }

        .node-header {
            border-bottom: 1px solid var(--border-muted);
            padding-bottom: 6px;
            margin-bottom: 8px;
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            gap: 8px;
        }

        .node-label {
            color: #fff;
            font-weight: bold;
            font-size: 12px;
            flex: 1;
            word-break: break-word;
            line-height: 1.2;
        }

        .node-type {
            font-size: 8px;
            color: var(--text-dim);
            white-space: nowrap;
            flex-shrink: 0;
        }

        .node-type.api {
            color: var(--neon-green);
        }

        .node-type.page {
            color: var(--neon-blue);
        }

        .node-detail {
            font-size: 9px;
            color: var(--text-dim);
            margin-bottom: 6px;
            line-height: 1.3;
        }

        .connector-dot {
            width: 6px;
            height: 6px;
            background: var(--border-muted);
            border-radius: 50%;
            position: absolute;
            transition: background 0.2s;
        }

        .dot-left { left: -4px; top: 50%; transform: translateY(-50%); }
        .dot-right { right: -4px; top: 50%; transform: translateY(-50%); }

        .node.selected .connector-dot {
            background: var(--neon-blue);
        }

        /* SVG for connections */
        #connection-svg {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 5;
        }

        .edge {
            stroke: var(--neon-blue);
            stroke-width: 1.5;
            fill: none;
            stroke-dasharray: 5;
            animation: dash 20s linear infinite;
            opacity: 0.6;
        }

        .edge.hotspot {
            stroke: var(--neon-orange);
            stroke-width: 2;
            opacity: 0.8;
        }

        .edge.hotspot-high {
            stroke: var(--neon-red);
            stroke-width: 2;
            filter: drop-shadow(0 0 2px var(--neon-red));
        }

        @keyframes dash {
            to { stroke-dashoffset: -1000; }
        }

        /* UI Overlays */
        .overlay-panel {
            position: absolute;
            background: rgba(13, 17, 23, 0.95);
            border: 1px solid var(--border-muted);
            backdrop-filter: blur(8px);
            z-index: 100;
        }

        .toolbar {
            top: 20px;
            left: 50%;
            transform: translateX(-50%);
            display: flex;
            gap: 10px;
            padding: 8px 16px;
            border-radius: 4px;
        }

        .sidebar-right {
            top: 20px;
            right: 20px;
            width: 300px;
            max-height: calc(100vh - 40px);
            padding: 20px;
            overflow-y: auto;
        }

        .status-footer {
            bottom: 20px;
            left: 20px;
            padding: 8px 12px;
        }

        .btn-util {
            padding: 6px 12px;
            border: 1px solid var(--border-muted);
            background: #161b22;
            color: #c9d1d9;
            cursor: pointer;
            font-family: inherit;
            font-size: inherit;
            text-transform: uppercase;
            transition: all 0.2s;
        }

        .btn-util:hover {
            background: #21262d;
            border-color: var(--text-dim);
        }

        .btn-util.active {
            border-color: var(--neon-blue);
            color: var(--neon-blue);
        }

        /* Sidebar content */
        .sidebar-section {
            margin-bottom: 20px;
        }

        .sidebar-label {
            color: var(--text-dim);
            font-size: 9px;
            margin-bottom: 4px;
            display: block;
        }

        .sidebar-value {
            color: #fff;
            font-weight: bold;
            font-size: 11px;
        }

        .stat-box {
            background: rgba(0,0,0,0.4);
            border: 1px solid #21262d;
            padding: 8px;
            margin: 8px 0;
            font-size: 9px;
            line-height: 1.4;
            border-radius: 4px;
        }

        .stat-box.danger {
            border-color: var(--neon-red);
            color: var(--neon-red);
        }

        .stat-box.warn {
            border-color: var(--neon-orange);
            color: var(--neon-orange);
        }

        .stat-list {
            font-size: 9px;
            line-height: 1.5;
        }

        .stat-list li {
            list-style: none;
            padding: 4px 0;
            color: #c9d1d9;
        }

        .loading {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            text-align: center;
            z-index: 200;
        }

        .spinner {
            width: 40px;
            height: 40px;
            border: 2px solid var(--border-muted);
            border-top-color: var(--neon-blue);
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
            margin: 0 auto 12px;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        #no-data {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            text-align: center;
            z-index: 200;
            color: var(--text-dim);
        }
    </style>
</head>

<body>

    <div id="canvas">
        <svg id="connection-svg"></svg>
        <div id="nodes-container"></div>
    </div>

    <div id="loading" class="loading">
        <div class="spinner"></div>
        <div>INITIALIZING NEURAL MAP...</div>
    </div>

    <div id="no-data" style="display: none;">
        <div style="font-size: 14px; margin-bottom: 8px;">NO DATA RECEIVED</div>
        <div style="font-size: 11px;">Upload a .bubble file to visualize</div>
    </div>

    <!-- Toolbar -->
    <div class="overlay-panel toolbar">
        <button class="btn-util" id="btn-fit">FIT_VIEW</button>
        <button class="btn-util" id="btn-hotspots">SHOW_HOTSPOTS</button>
        <button class="btn-util" id="btn-reset">RESET</button>
        <div style="width: 1px; background: #21262d; margin: 0 10px;"></div>
        <button class="btn-util" id="btn-zoom">ZOOM: 100%</button>
    </div>

    <!-- Sidebar -->
    <div class="overlay-panel sidebar-right" id="sidebar">
        <div style="text-align: center; color: var(--text-dim);">SELECT A WORKFLOW</div>
    </div>

    <!-- Status Footer -->
    <div class="overlay-panel status-footer" id="status">
        INITIALIZING...
    </div>

    <script>
        // Global state
        let graphData = null;
        let nodeElements = [];
        let selectedNode = null;
        let scale = 1;
        let tx = 0;
        let ty = 0;

        // Canvas setup
        const canvas = document.getElementById('canvas');
        const svg = d3.select('#connection-svg');
        const nodesContainer = document.getElementById('nodes-container');

        // Listen for graph data from postMessage
        window.addEventListener('message', (event) => {
            try {
                let payload = event.data;

                // Handle array wrapping from Bubble
                if (Array.isArray(payload)) {
                    payload = payload[0];
                }

                // Check for errors
                if (payload.error || payload.detail) {
                    console.error('API Error:', payload.detail || payload.error);
                    showError(payload.detail || 'Unknown error');
                    return;
                }

                // Validate structure
                if (!payload.graph || !payload.graph.nodes) {
                    showError('Invalid graph data received');
                    return;
                }

                graphData = payload.graph;
                initializeVisualization();
            } catch (e) {
                console.error('Error processing graph:', e);
                showError(e.message);
            }
        });

        function showError(message) {
            document.getElementById('loading').style.display = 'none';
            document.getElementById('no-data').innerHTML = `
                <div style="color: var(--neon-red); font-size: 14px; margin-bottom: 8px;">ERROR</div>
                <div style="font-size: 11px; color: #c9d1d9;">${message}</div>
            `;
            document.getElementById('no-data').style.display = 'block';
        }

        function initializeVisualization() {
            document.getElementById('loading').style.display = 'none';

            if (!graphData.nodes || graphData.nodes.length === 0) {
                showError('No workflows found in .bubble file');
                return;
            }

            // Clear previous
            nodesContainer.innerHTML = '';
            svg.selectAll('*').remove();

            // Create node elements
            createNodes();
            
            // Draw edges
            drawEdges();
            
            // Apply force simulation
            initializeForceLayout();
            
            // Update status
            updateStatus();
            
            // Setup interactions
            setupInteractions();
        }

        function createNodes() {
            graphData.nodes.forEach(nodeData => {
                const node = document.createElement('div');
                node.className = 'node';
                node.id = `node-${nodeData.id}`;
                
                // Determine node type
                const isAPI = nodeData.data?.type === 'API_WORKFLOW';
                const isHotspot = nodeData.data?.is_hotspot;
                
                if (isHotspot) {
                    if (nodeData.data?.hotspot_score >= 4) {
                        node.classList.add('hotspot-high');
                    } else {
                        node.classList.add('hotspot');
                    }
                }

                const label = resolveLabel(nodeData);
                const actionCount = nodeData.data?.action_count || 0;
                const eventType = nodeData.data?.event || 'Unknown';

                node.innerHTML = `
                    <div class="node-header">
                        <div class="node-label">${escapeHtml(label)}</div>
                        <div class="node-type ${isAPI ? 'api' : 'page'}">${isAPI ? 'API' : 'PAGE'}</div>
                    </div>
                    <div class="node-detail">EVENT: ${eventType}</div>
                    <div class="node-detail">ACTIONS: ${actionCount}</div>
                    ${isHotspot ? `<div class="node-detail" style="color: var(--neon-orange);">⚠ HOTSPOT</div>` : ''}
                    <div class="connector-dot dot-left"></div>
                    <div class="connector-dot dot-right"></div>
                `;

                // Store initial position
                node.dataset.id = nodeData.id;
                node.dataset.x = nodeData.position?.x || Math.random() * 800;
                node.dataset.y = nodeData.position?.y || Math.random() * 600;

                // Position
                node.style.left = node.dataset.x + 'px';
                node.style.top = node.dataset.y + 'px';

                // Click handler
                node.addEventListener('click', () => selectNode(nodeData));

                nodesContainer.appendChild(node);
                nodeElements.push({ element: node, data: nodeData });
            });
        }

        function drawEdges() {
            if (!graphData.edges || graphData.edges.length === 0) {
                return;
            }

            graphData.edges.forEach(edge => {
                const sourceNode = nodeElements.find(n => n.data.id === edge.source);
                const targetNode = nodeElements.find(n => n.data.id === edge.target);

                if (!sourceNode || !targetNode) return;

                // Create curved path
                const path = document.createElementNS('http://www.w3.org/2000/svg', 'path');
                
                const x1 = parseFloat(sourceNode.element.dataset.x) + 220;
                const y1 = parseFloat(sourceNode.element.dataset.y) + 35;
                const x2 = parseFloat(targetNode.element.dataset.x);
                const y2 = parseFloat(targetNode.element.dataset.y) + 35;
                
                const dx = (x2 - x1) * 0.25;
                path.setAttribute('d', `M ${x1} ${y1} C ${x1 + dx} ${y1}, ${x2 - dx} ${y2}, ${x2} ${y2}`);
                path.setAttribute('class', 'edge');
                
                svg.node().appendChild(path);
                
                // Store for animation updates
                path.sourceNode = sourceNode;
                path.targetNode = targetNode;
            });
        }

        function resolveLabel(nodeData) {
            return nodeData.data?.label || 
                   nodeData.data?.name ||
                   nodeData.data?.event ||
                   nodeData.id;
        }

        function escapeHtml(text) {
            const map = {
                '&': '&amp;',
                '<': '&lt;',
                '>': '&gt;',
                '"': '&quot;',
                "'": '&#039;'
            };
            return text.replace(/[&<>"']/g, m => map[m]);
        }

        function initializeForceLayout() {
            // Simple force simulation using D3
            const simulation = d3.forceSimulation(nodeElements.map(n => ({
                x: parseFloat(n.element.dataset.x),
                y: parseFloat(n.element.dataset.y),
                element: n.element,
                data: n.data
            })))
                .force('charge', d3.forceManyBody().strength(-300))
                .force('link', d3.forceLink()
                    .links(graphData.edges || [])
                    .source(d => nodeElements.find(n => n.data.id === d.source)?.data)
                    .target(d => nodeElements.find(n => n.data.id === d.target)?.data)
                    .distance(200))
                .force('center', d3.forceCenter(window.innerWidth / 2, window.innerHeight / 2))
                .force('collide', d3.forceCollide().radius(150))
                .on('tick', () => {
                    nodeElements.forEach((item, i) => {
                        const node = simulation.nodes()[i];
                        item.element.style.left = node.x + 'px';
                        item.element.style.top = node.y + 'px';
                        item.element.dataset.x = node.x;
                        item.element.dataset.y = node.y;
                    });
                    
                    updateEdges();
                })
                .alpha(0.8)
                .alphaDecay(0.01);

            // Stop after convergence
            setTimeout(() => simulation.stop(), 5000);
        }

        function updateEdges() {
            svg.selectAll('.edge').each(function() {
                const path = this;
                const x1 = parseFloat(path.sourceNode.element.dataset.x) + 220;
                const y1 = parseFloat(path.sourceNode.element.dataset.y) + 35;
                const x2 = parseFloat(path.targetNode.element.dataset.x);
                const y2 = parseFloat(path.targetNode.element.dataset.y) + 35;
                
                const dx = (x2 - x1) * 0.25;
                path.setAttribute('d', `M ${x1} ${y1} C ${x1 + dx} ${y1}, ${x2 - dx} ${y2}, ${x2} ${y2}`);
            });
        }

        function selectNode(nodeData) {
            // Deselect previous
            if (selectedNode) {
                document.getElementById(`node-${selectedNode.id}`)?.classList.remove('selected');
            }

            selectedNode = nodeData;
            document.getElementById(`node-${nodeData.id}`).classList.add('selected');

            // Update sidebar
            updateSidebar(nodeData);
        }

        function updateSidebar(nodeData) {
            const sidebar = document.getElementById('sidebar');
            const isAPI = nodeData.data?.type === 'API_WORKFLOW';

            sidebar.innerHTML = `
                <div class="sidebar-section">
                    <span class="sidebar-label">WORKFLOW_NAME</span>
                    <div class="sidebar-value">${escapeHtml(resolveLabel(nodeData))}</div>
                </div>

                <div class="sidebar-section">
                    <span class="sidebar-label">TYPE</span>
                    <div class="sidebar-value">${isAPI ? 'API_WORKFLOW' : 'PAGE_WORKFLOW'}</div>
                </div>

                ${nodeData.data?.page ? `
                    <div class="sidebar-section">
                        <span class="sidebar-label">PAGE</span>
                        <div class="sidebar-value">${nodeData.data.page}</div>
                    </div>
                ` : ''}

                <div class="sidebar-section">
                    <span class="sidebar-label">EVENT</span>
                    <div class="sidebar-value">${nodeData.data?.event || 'Unknown'}</div>
                </div>

                <div class="sidebar-section">
                    <span class="sidebar-label">ACTIONS</span>
                    <div class="sidebar-value">${nodeData.data?.action_count || 0}</div>
                </div>

                ${nodeData.data?.is_hotspot ? `
                    <div class="stat-box warn">
                        ⚠ HIGH_COMPLEXITY_HOTSPOT
                        <br>SCORE: ${nodeData.data?.hotspot_score || 'N/A'}
                    </div>
                ` : ''}

                ${nodeData.data?.db_ops && nodeData.data.db_ops.length > 0 ? `
                    <div class="sidebar-section">
                        <span class="sidebar-label">DATABASE_OPS</span>
                        <ul class="stat-list">
                            ${nodeData.data.db_ops.map(op => `<li>• ${op}</li>`).join('')}
                        </ul>
                    </div>
                ` : ''}

                ${nodeData.data?.api_calls && nodeData.data.api_calls.length > 0 ? `
                    <div class="sidebar-section">
                        <span class="sidebar-label">API_CALLS</span>
                        <ul class="stat-list">
                            ${nodeData.data.api_calls.map(call => `<li>• ${call}</li>`).join('')}
                        </ul>
                    </div>
                ` : ''}
            `;
        }

        function updateStatus() {
            const status = document.getElementById('status');
            const hotspotCount = graphData.nodes.filter(n => n.data?.is_hotspot).length;
            
            status.innerHTML = `
                NODES: <span style="color: var(--neon-blue); font-weight: bold;">${graphData.nodes.length}</span> 
                | EDGES: <span style="color: var(--neon-blue); font-weight: bold;">${(graphData.edges || []).length}</span> 
                | HOTSPOTS: <span style="color: var(--neon-orange); font-weight: bold;">${hotspotCount}</span>
            `;
        }

        function setupInteractions() {
            // Zoom with mouse wheel
            canvas.addEventListener('wheel', (e) => {
                e.preventDefault();
                const zoom = e.deltaY > 0 ? 0.9 : 1.1;
                scale *= zoom;
                scale = Math.max(0.5, Math.min(3, scale));
                canvas.style.transform = `scale(${scale})`;
                document.getElementById('btn-zoom').textContent = `ZOOM: ${Math.round(scale * 100)}%`;
            });

            // Button handlers
            document.getElementById('btn-fit').addEventListener('click', () => {
                scale = 1;
                tx = 0;
                ty = 0;
                canvas.style.transform = 'none';
                document.getElementById('btn-zoom').textContent = 'ZOOM: 100%';
            });

            document.getElementById('btn-hotspots').addEventListener('click', (e) => {
                e.target.classList.toggle('active');
                // TODO: Implement hotspot filtering
            });

            document.getElementById('btn-reset').addEventListener('click', () => {
                selectedNode = null;
                nodeElements.forEach(n => n.element.classList.remove('selected'));
                document.getElementById('sidebar').innerHTML = '<div style="text-align: center; color: var(--text-dim);">SELECT A WORKFLOW</div>';
            });
        }

        // Pan support
        let panning = false;
        let panStart = { x: 0, y: 0 };

        canvas.addEventListener('mousedown', (e) => {
            if (e.button === 2 || e.ctrlKey) { // Right click or Ctrl+click
                panning = true;
                panStart = { x: e.clientX, y: e.clientY };
            }
        });

        canvas.addEventListener('mousemove', (e) => {
            if (panning) {
                const dx = e.clientX - panStart.x;
                const dy = e.clientY - panStart.y;
                tx += dx;
                ty += dy;
                canvas.style.transform = `translate(${tx}px, ${ty}px) scale(${scale})`;
                panStart = { x: e.clientX, y: e.clientY };
            }
        });

        canvas.addEventListener('mouseup', () => {
            panning = false;
        });

        // Support keyboard shortcuts
        document.addEventListener('keydown', (e) => {
            if (e.key === '/') {
                // TODO: Search functionality
            }
        });

    </script>
</body>
</html>
