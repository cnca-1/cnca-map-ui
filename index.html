<!DOCTYPE html>
<html>
<head>
  <title>CNCA Neural Map (Canvas Engine)</title>

  <style>
    html, body {
      margin: 0;
      padding: 0;
      overflow: hidden;
      background: #0b0e14;
      font-family: monospace;
    }

    canvas {
      display: block;
    }

    #panel {
      position: absolute;
      right: 0;
      top: 0;
      width: 260px;
      height: 100%;
      background: #0f172a;
      color: white;
      padding: 12px;
      font-size: 12px;
      overflow: auto;
      border-left: 1px solid #1e293b;
    }

    #loading {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      color: #475569;
    }
  </style>
</head>

<body>
  <div id="loading">Awaiting Neural Data...</div>
  <div id="panel">No node selected</div>
  <canvas id="canvas"></canvas>

  <script>
    const canvas = document.getElementById("canvas");
    const ctx = canvas.getContext("2d");

    let nodes = [];
    let edges = [];

    let offsetX = 0;
    let offsetY = 0;
    let scale = 1;

    let draggingNode = null;
    let dragOffsetX = 0;
    let dragOffsetY = 0;

    let isPanning = false;
    let lastMouse = { x: 0, y: 0 };

    function resize() {
      canvas.width = window.innerWidth;
      canvas.height = window.innerHeight;
      draw();
    }
    window.addEventListener("resize", resize);
    resize();

    function autoLayout(nodes, edges) {
      const result = [];

      nodes.forEach((n, i) => {
        console.log("NODE SAMPLE:", n);

        result.push({
          ...n,
          x: (i % 10) * 180,
          y: Math.floor(i / 10) * 120,
          width: 160,
          height: 50
        });
      });

      return result;
    }

   window.addEventListener("message", (event) => {
    const loading = document.getElementById("loading");
    const panel = document.getElementById("panel");
    
    function showError(title, message) {
        loading.style.display = "none";
        panel.innerHTML = `
            <div style="color:#ef4444;font-weight:bold;margin-bottom:8px;">${title}</div>
            <div style="color:#f87171;font-size:11px;line-height:1.4;margin-bottom:12px;">
                ${message}
            </div>
            <hr style="border:none;border-top:1px solid #334155;margin:8px 0">
            <div style="color:#94a3b8;font-size:10px;">
                <strong>Try:</strong>
                <ul style="margin:4px 0;padding-left:16px">
                    <li>Ensure .bubble file is valid</li>
                    <li>Check file size (&lt;10MB)</li>
                    <li>Reload page and try again</li>
                </ul>
            </div>
        `;
        console.error(`${title}: ${message}`);
    }
    
    try {
        let payload = event.data;
        console.log("📩 Received message:", typeof payload);
        
        // Handle API error response
        if (payload && payload.detail) {
            return showError("❌ API Error", payload.detail);
        }
        
        // Parse if string
        if (typeof payload === "string") {
            try {
                payload = JSON.parse(payload);
            } catch (e) {
                return showError(
                    "❌ Invalid JSON",
                    "Response from API could not be parsed as JSON"
                );
            }
        }
        
        // Validate payload is object
        if (!payload || typeof payload !== "object") {
            return showError(
                "❌ Invalid Response",
                `Expected object, got ${typeof payload}`
            );
        }
        
        // Extract graph
        let graph = payload.graph;
        
        // Handle if graph is stringified JSON (shouldn't happen, but Bubble is weird)
        if (typeof graph === "string") {
            try {
                graph = JSON.parse(graph);
            } catch (e) {
                return showError(
                    "❌ Graph Parse Error",
                    "Graph data inside payload could not be parsed"
                );
            }
        }
        
        // Handle if graph is array (extract first element)
        if (Array.isArray(graph)) {
            if (graph.length === 0) {
                return showError("❌ Empty Array", "Graph array is empty");
            }
            console.log("ℹ️  Graph is array, using first element");
            graph = graph[0];
        }
        
        // Validate graph structure
        if (!graph || typeof graph !== "object") {
            return showError(
                "❌ Invalid Graph",
                `Expected object, got ${typeof graph}`
            );
        }
        
        if (!Array.isArray(graph.nodes)) {
            const keys = Object.keys(graph).join(", ");
            return showError(
                "❌ Missing Nodes",
                `Graph missing 'nodes' array. Has: ${keys}`
            );
        }
        
        if (graph.nodes.length === 0) {
            return showError(
                "⚠️ Empty Graph",
                "The .bubble file has no workflows to visualize"
            );
        }
        
        // Success! Load the graph
        console.log(`✅ Loading ${graph.nodes.length} nodes`);
        
        nodes = autoLayout(graph.nodes, graph.edges || []);
        edges = graph.edges || [];
        
        loading.style.display = "none";
        draw();
        
        // Show success state
        panel.innerHTML = `
            <div style="color:#10b981;font-weight:bold;margin-bottom:8px;">✓ Loaded Successfully</div>
            <div style="color:#94a3b8;font-size:11px;margin-bottom:12px;">
                <strong>${nodes.length}</strong> workflows<br>
                <strong>${edges.length}</strong> connections
            </div>
            <hr style="border:none;border-top:1px solid #334155;margin:8px 0">
            <div style="color:#94a3b8;font-size:10px;line-height:1.6;">
                <strong>Controls:</strong>
                <ul style="margin:4px 0;padding-left:16px">
                    <li>Click nodes for details</li>
                    <li>Drag nodes to move</li>
                    <li>Scroll to zoom</li>
                    <li>Press <code style="color:#d4d4d8">/</code> to search</li>
                </ul>
            </div>
        `;
        
    } catch (e) {
        showError(
            "❌ Unexpected Error",
            `${e.message}. Check browser console for details.`
        );
    }
});

    function screenToWorld(x, y) {
      return {
        x: (x - offsetX) / scale,
        y: (y - offsetY) / scale
      };
    }

    function getNodeAt(x, y) {
      const w = screenToWorld(x, y);

      return nodes.find(n =>
        w.x >= n.x &&
        w.x <= n.x + n.width &&
        w.y >= n.y &&
        w.y <= n.y + n.height
      );
    }

    function resolveLabel(n) {
      return (
        n.data?.name ||
        n.data?.default_name ||
        n.data?.element_name ||
        n.data?.elementName ||
        n.data?.custom_name ||
        n.data?.label ||
        (n.data?.event && n.data?.element_id
          ? `${n.data.event} (${n.data.element_id})`
          : n.data?.event) ||
        n.id
      );
    }

    function draw() {
      ctx.clearRect(0, 0, canvas.width, canvas.height);

      ctx.save();
      ctx.translate(offsetX, offsetY);
      ctx.scale(scale, scale);

      // edges
      ctx.strokeStyle = "#3b82f6";
      ctx.lineWidth = 2;

      edges.forEach(e => {
        const s = nodes.find(n => n.id === e.source);
        const t = nodes.find(n => n.id === e.target);
        if (!s || !t) return;

        const midX = s.x + (t.x - s.x) * 0.5;

        ctx.beginPath();
        ctx.moveTo(s.x + 80, s.y + 25);
        ctx.bezierCurveTo(
          midX, s.y + 25,
          midX, t.y + 25,
          t.x + 80, t.y + 25
        );
        ctx.stroke();
      });

      // nodes
      nodes.forEach(n => {
        ctx.fillStyle = "#1e293b";
        ctx.strokeStyle = "#334155";

        ctx.fillRect(n.x, n.y, n.width, n.height);
        ctx.strokeRect(n.x, n.y, n.width, n.height);

        ctx.fillStyle = "#f8fafc";
        ctx.font = "11px monospace";

        const displayLabel = resolveLabel(n);

        ctx.fillText(displayLabel, n.x + 10, n.y + 28);
      });

      ctx.restore();

      drawMiniMap();
    }

    function drawMiniMap() {
      const w = 200, h = 120;

      ctx.save();
      ctx.globalAlpha = 0.9;

      ctx.fillStyle = "#0f172a";
      ctx.fillRect(canvas.width - w - 10, canvas.height - h - 10, w, h);

      const sx = w / 2000;
      const sy = h / 2000;

      ctx.fillStyle = "#3b82f6";

      nodes.forEach(n => {
        ctx.fillRect(
          canvas.width - w - 10 + n.x * sx,
          canvas.height - h - 10 + n.y * sy,
          3, 3
        );
      });

      ctx.restore();
    }

    canvas.addEventListener("mousedown", (e) => {
      const node = getNodeAt(e.clientX, e.clientY);

      if (node) {
        draggingNode = node;

        const w = screenToWorld(e.clientX, e.clientY);
        dragOffsetX = w.x - node.x;
        dragOffsetY = w.y - node.y;
      } else {
        isPanning = true;
        lastMouse = { x: e.clientX, y: e.clientY };
      }
    });

    canvas.addEventListener("mousemove", (e) => {
      if (draggingNode) {
        const w = screenToWorld(e.clientX, e.clientY);

        draggingNode.x = w.x - dragOffsetX;
        draggingNode.y = w.y - dragOffsetY;

        draw();
      }

      if (isPanning) {
        offsetX += e.clientX - lastMouse.x;
        offsetY += e.clientY - lastMouse.y;

        lastMouse = { x: e.clientX, y: e.clientY };

        draw();
      }
    });

    window.addEventListener("mouseup", () => {
      draggingNode = null;
      isPanning = false;
    });

    canvas.addEventListener("wheel", (e) => {
      e.preventDefault();

      const zoom = 0.001;
      const delta = e.deltaY * -zoom;

      const mouse = { x: e.clientX, y: e.clientY };
      const w = screenToWorld(mouse.x, mouse.y);

      scale += delta;
      scale = Math.max(0.4, Math.min(2.5, scale));

      offsetX = mouse.x - w.x * scale;
      offsetY = mouse.y - w.y * scale;

      draw();
    }, { passive: false });

    canvas.addEventListener("click", (e) => {
      const node = getNodeAt(e.clientX, e.clientY);
      if (!node) return;

      document.getElementById("panel").innerHTML = `
        <div style="font-weight:bold;margin-bottom:8px;">${node.id}</div>
        <div style="opacity:0.8;margin-bottom:8px;">${resolveLabel(node)}</div>
        <pre style="white-space:pre-wrap;color:#94a3b8">
${JSON.stringify(node, null, 2)}
        </pre>
      `;
    });

    window.addEventListener("keydown", (e) => {
      if (e.key !== "/") return;

      const term = prompt("Search node:");
      if (!term) return;

      const match = nodes.find(n =>
        resolveLabel(n).toLowerCase().includes(term.toLowerCase())
      );

      if (match) {
        offsetX = -match.x * scale + window.innerWidth / 2;
        offsetY = -match.y * scale + window.innerHeight / 2;
        draw();
      }
    });

    draw();
  </script>
</body>
</html>
