<!DOCTYPE html>
<html>
<head>
    <title>CNCA Neural Map</title>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/reactflow@11.10.1/dist/react-flow.standalone.production.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://unpkg.com/reactflow@11.10.1/dist/style.css">
    <style>
        body, html, #root { width: 100%; height: 100%; margin: 0; background: #0b0e14; overflow: hidden; }
        .react-flow__node { 
            background: #1e293b; color: #f8fafc; border: 1px solid #334155; 
            border-radius: 8px; padding: 12px; font-family: ui-monospace, monospace; 
            font-size: 11px; width: 180px; text-align: center; 
        }
        .react-flow__edge-path { stroke: #3b82f6; stroke-width: 2; }
        .react-flow__attribution { display: none; }
    </style>
</head>
<body>
    <div id="root"></div>
    <script>
        const { useState, useEffect } = React;
        // This is the specific line that fixes Error #130
        const ReactFlow = window.ReactFlow.ReactFlow; 

        function App() {
            const [nodes, setNodes] = useState([]);
            const [edges, setEdges] = useState([]);

            useEffect(() => {
                const handleMessage = (event) => {
                    if (event.data && event.data.nodes) {
                        const laidOutNodes = event.data.nodes.map((node, i) => ({
                            ...node,
                            // Spread them out more so 189 nodes don't overlap
                            position: { x: (i % 8) * 250, y: Math.floor(i / 8) * 150 }
                        }));
                        setNodes(laidOutNodes);
                        setEdges(event.data.edges || []);
                    }
                };
                window.addEventListener("message", handleMessage);
                return () => window.removeEventListener("message", handleMessage);
            }, []);

            if (nodes.length === 0) {
                return React.createElement('div', { 
                    style: { color: '#475569', display: 'flex', justifyContent: 'center', alignItems: 'center', height: '100vh', fontFamily: 'monospace' } 
                }, "Awaiting Neural Data...");
            }

            return React.createElement(ReactFlow, {
                nodes: nodes,
                edges: edges,
                fitView: true,
                // Dark mode styles
                colorMode: 'dark'
            });
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(React.createElement(App));
    </script>
</body>
</html>
