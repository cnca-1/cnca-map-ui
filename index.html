<!DOCTYPE html>
<html>
<head>
    <title>CNCA Neural Map</title>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/reactflow@11.10.1/dist/react-flow.standalone.production.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://unpkg.com/reactflow@11.10.1/dist/style.css">
    <style>
        body, html, #root { width: 100%; height: 100%; margin: 0; background: #0b0e14; overflow: hidden; }
        .react-flow__node { 
            background: #1e293b; color: #f8fafc; border: 1px solid #334155; 
            border-radius: 8px; padding: 12px; font-family: ui-monospace, monospace; 
            font-size: 11px; width: 180px; text-align: center; 
        }
        .react-flow__edge-path { stroke: #3b82f6; stroke-width: 2; }
        .react-flow__attribution { display: none; }
    </style>
</head>
<body>
    <div id="root"></div>
    <script>
        // Wait for the window to finish loading everything
        window.onload = function() {
            const { useState, useEffect } = React;
            
            // This is the most compatible way to find the Flow component
            const Flow = window.ReactFlow ? (window.ReactFlow.ReactFlow || window.ReactFlow.default || window.ReactFlow) : null;

            if (!Flow) {
                document.getElementById('root').innerHTML = '<div style="color:white; padding:20px;">Error: ReactFlow library not found. Check your internet connection.</div>';
                return;
            }

            function App() {
                const [nodes, setNodes] = useState([]);
                const [edges, setEdges] = useState([]);

                useEffect(() => {
                    const handleMessage = (event) => {
                        if (event.data && event.data.nodes) {
                            const laidOutNodes = event.data.nodes.map((node, i) => ({
                                ...node,
                                position: { x: (i % 8) * 250, y: Math.floor(i / 10) * 150 }
                            }));
                            setNodes(laidOutNodes);
                            setEdges(event.data.edges || []);
                        }
                    };
                    window.addEventListener("message", handleMessage);
                    return () => window.removeEventListener("message", handleMessage);
                }, []);

                if (nodes.length === 0) {
                    return React.createElement('div', { 
                        style: { color: '#475569', display: 'flex', justifyContent: 'center', alignItems: 'center', height: '100vh', fontFamily: 'monospace' } 
                    }, "Awaiting Neural Data...");
                }

                return React.createElement(Flow, {
                    nodes: nodes,
                    edges: edges,
                    fitView: true,
                    colorMode: 'dark'
                });
            }

            const root = ReactDOM.createRoot(document.getElementById('root'));
            root.render(React.createElement(App));
        };
    </script>
</body>
</html>
