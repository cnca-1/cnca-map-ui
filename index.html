<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CNCA // NEURAL-MAP v2</title>
    <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@300;400;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-deep: #080a0f;
            --panel-bg: #0d1117;
            --card-bg: #161b22;
            --border-muted: #21262d;
            --border-hover: #30363d;
            --neon-green: #3fb950;
            --neon-blue: #2f81f7;
            --neon-purple: #a371f7;
            --neon-orange: #d29922;
            --neon-red: #f85149;
            --neon-cyan: #39d353;
            --text-primary: #e6edf3;
            --text-secondary: #8b949e;
            --text-dim: #484f58;
            --page-blue: rgba(47, 129, 247, 0.08);
            --page-blue-border: rgba(47, 129, 247, 0.25);
        }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background: var(--bg-deep);
            color: var(--text-primary);
            font-family: 'JetBrains Mono', monospace;
            overflow: hidden;
            height: 100vh;
            font-size: 11px;
            letter-spacing: 0.03em;
        }
        #viewport {
            width: 100%; height: 100%;
            overflow: hidden; position: relative;
            cursor: grab;
        }
        #viewport:active { cursor: grabbing; }
        #world {
            position: absolute;
            transform-origin: 0 0;
            will-change: transform;
        }
        .grid-bg {
            position: fixed; inset: 0;
            background:
                radial-gradient(circle at 50% 50%, rgba(47,129,247,0.03) 0%, transparent 70%),
                radial-gradient(circle, #161b22 1px, transparent 1px);
            background-size: 100% 100%, 30px 30px;
            pointer-events: none; z-index: 0;
        }
        #edge-svg {
            position: absolute; top: 0; left: 0;
            overflow: visible; pointer-events: none; z-index: 1;
        }
        .edge-path {
            fill: none; stroke-width: 1.5; opacity: 0.5;
            transition: opacity 0.2s;
        }
        .edge-path.type-triggers  { stroke: var(--neon-blue); stroke-dasharray: 6 4; }
        .edge-path.type-api       { stroke: var(--neon-purple); }
        .edge-path.type-default   { stroke: var(--border-hover); stroke-dasharray: 4 4; }
        .edge-path.highlighted    { opacity: 1; stroke-width: 2.5; filter: drop-shadow(0 0 4px currentColor); }
        .edge-path.dimmed         { opacity: 0.08; }
        .edge-arrow { fill: var(--neon-blue); opacity: 0.6; }
        .page-group {
            position: absolute;
            background: var(--page-blue);
            border: 1px solid var(--page-blue-border);
            border-radius: 8px;
            padding: 52px 20px 20px 20px;
            min-width: 280px; z-index: 2;
        }
        .page-group-header {
            position: absolute; top: 0; left: 0; right: 0;
            padding: 12px 16px;
            border-bottom: 1px solid var(--page-blue-border);
            display: flex; justify-content: space-between; align-items: center;
            border-radius: 8px 8px 0 0;
            background: rgba(47, 129, 247, 0.04);
        }
        .page-group-title {
            font-weight: 700; font-size: 12px;
            color: var(--neon-blue); text-transform: uppercase;
        }
        .page-group-badge {
            font-size: 9px; padding: 2px 6px;
            background: rgba(47,129,247,0.15);
            color: var(--neon-blue); border-radius: 3px;
        }
        .wf-node {
            background: var(--card-bg);
            border: 1px solid var(--border-muted);
            border-radius: 4px;
            padding: 10px 12px;
            margin-bottom: 8px;
            cursor: pointer;
            transition: all 0.15s ease;
            position: relative;
        }
        .wf-node:last-child { margin-bottom: 0; }
        .wf-node:hover { border-color: var(--border-hover); background: #1c2128; }
        .wf-node.selected {
            border-color: var(--neon-blue);
            box-shadow: 0 0 0 1px var(--neon-blue), 0 0 12px rgba(47,129,247,0.15);
        }
        .wf-node.hotspot     { border-left: 3px solid var(--neon-orange); }
        .wf-node.hotspot-high { border-left: 3px solid var(--neon-red); }
        .wf-node-header {
            display: flex; justify-content: space-between;
            align-items: flex-start; gap: 6px; margin-bottom: 4px;
        }
        .wf-node-name {
            font-size: 11px; font-weight: 600;
            color: var(--text-primary);
            line-height: 1.3; word-break: break-word;
        }
        .wf-node-tag {
            font-size: 8px; padding: 2px 5px; border-radius: 2px;
            flex-shrink: 0; text-transform: uppercase; font-weight: 600;
        }
        .wf-node-tag.event-click     { background: rgba(47,129,247,0.15); color: var(--neon-blue); }
        .wf-node-tag.event-page      { background: rgba(63,185,80,0.15); color: var(--neon-green); }
        .wf-node-tag.event-input     { background: rgba(163,113,247,0.15); color: var(--neon-purple); }
        .wf-node-tag.event-condition  { background: rgba(210,153,34,0.15); color: var(--neon-orange); }
        .wf-node-tag.event-logout    { background: rgba(248,81,73,0.15); color: var(--neon-red); }
        .wf-node-tag.event-api       { background: rgba(57,211,83,0.15); color: var(--neon-cyan); }
        .wf-node-tag.event-default   { background: rgba(72,79,88,0.2); color: var(--text-secondary); }
        .wf-node-meta { font-size: 9px; color: var(--text-dim); }
        .conn-dot {
            width: 6px; height: 6px; border-radius: 50%;
            background: var(--border-muted);
            position: absolute; top: 50%; transform: translateY(-50%); z-index: 3;
        }
        .conn-dot.left  { left: -4px; }
        .conn-dot.right { right: -4px; }
        .wf-node.selected .conn-dot { background: var(--neon-blue); }
        .api-group {
            position: absolute;
            background: rgba(163,113,247,0.06);
            border: 1px solid rgba(163,113,247,0.2);
            border-radius: 8px;
            padding: 52px 20px 20px 20px;
            min-width: 260px; z-index: 2;
        }
        .api-group .page-group-header {
            background: rgba(163,113,247,0.04);
            border-color: rgba(163,113,247,0.2);
        }
        .api-group .page-group-title { color: var(--neon-purple); }
        .api-group .page-group-badge {
            background: rgba(163,113,247,0.15); color: var(--neon-purple);
        }
        .overlay-panel {
            position: fixed;
            background: rgba(13,17,23,0.95);
            border: 1px solid var(--border-muted);
            backdrop-filter: blur(12px);
            z-index: 200; border-radius: 6px;
        }
        .toolbar {
            top: 16px; left: 50%; transform: translateX(-50%);
            display: flex; gap: 1px; padding: 4px;
            background: var(--panel-bg);
        }
        .btn-tool {
            padding: 7px 14px; border: none; background: transparent;
            color: var(--text-secondary); cursor: pointer;
            font-family: inherit; font-size: 10px;
            text-transform: uppercase; letter-spacing: 0.05em;
            transition: all 0.15s; border-radius: 3px;
        }
        .btn-tool:hover { background: var(--card-bg); color: var(--text-primary); }
        .btn-tool.active { background: rgba(47,129,247,0.15); color: var(--neon-blue); }
        .toolbar-divider { width: 1px; background: var(--border-muted); margin: 4px 6px; }
        .sidebar {
            top: 16px; right: 16px; width: 300px;
            max-height: calc(100vh - 32px);
            padding: 16px; overflow-y: auto;
        }
        .sidebar-title { font-size: 10px; color: var(--text-dim); text-transform: uppercase; margin-bottom: 12px; letter-spacing: 0.08em; }
        .sidebar-field { margin-bottom: 14px; }
        .sidebar-label { font-size: 9px; color: var(--text-dim); text-transform: uppercase; margin-bottom: 3px; }
        .sidebar-value { font-size: 11px; color: var(--text-primary); font-weight: 600; word-break: break-word; }
        .sidebar-divider { border: none; border-top: 1px solid var(--border-muted); margin: 14px 0; }
        .sidebar-list { list-style: none; font-size: 10px; }
        .sidebar-list li { padding: 4px 0; color: var(--text-secondary); border-bottom: 1px solid rgba(33,38,45,0.5); }
        .sidebar-list li:last-child { border: none; }
        .break-risk {
            background: rgba(248,81,73,0.1);
            border: 1px solid rgba(248,81,73,0.3);
            border-radius: 4px; padding: 10px; margin-top: 8px;
        }
        .status-bar {
            bottom: 16px; left: 16px; padding: 8px 14px;
            font-size: 10px; color: var(--text-secondary);
            display: flex; gap: 16px;
        }
        .status-bar span { color: var(--text-primary); font-weight: 600; }
        .legend {
            bottom: 16px; right: 16px; padding: 12px 16px; font-size: 9px;
        }
        .legend-title { color: var(--text-dim); text-transform: uppercase; margin-bottom: 8px; font-size: 9px; letter-spacing: 0.08em; }
        .legend-item { display: flex; align-items: center; gap: 8px; margin-bottom: 5px; color: var(--text-secondary); }
        .legend-swatch { width: 16px; height: 3px; border-radius: 1px; flex-shrink: 0; }
        #loading {
            position: fixed; inset: 0;
            display: flex; align-items: center; justify-content: center;
            z-index: 300; background: var(--bg-deep);
            flex-direction: column; gap: 16px;
        }
        .spinner {
            width: 32px; height: 32px;
            border: 2px solid var(--border-muted);
            border-top-color: var(--neon-blue);
            border-radius: 50%;
            animation: spin 0.7s linear infinite;
        }
        @keyframes spin { to { transform: rotate(360deg); } }
        #loading.hidden { display: none; }
    </style>
</head>
<body>
    <div class="grid-bg"></div>
    <div id="loading">
        <div class="spinner"></div>
        <div style="color: var(--text-dim);">INITIALIZING NEURAL MAP...</div>
    </div>
    <div id="viewport">
        <div id="world">
            <svg id="edge-svg">
                <defs>
                    <marker id="arrowhead" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
                        <polygon points="0 0, 8 3, 0 6" class="edge-arrow" />
                    </marker>
                </defs>
            </svg>
        </div>
    </div>
    <div class="overlay-panel toolbar" id="toolbar">
        <button class="btn-tool active" data-mode="global">GLOBAL_VIEW</button>
        <button class="btn-tool" data-mode="page">PAGE_VIEW</button>
        <div class="toolbar-divider"></div>
        <button class="btn-tool" id="btn-fit">FIT</button>
        <button class="btn-tool" id="btn-zoom-label">100%</button>
    </div>
    <div class="overlay-panel sidebar" id="sidebar">
        <div class="sidebar-title">SELECT A WORKFLOW</div>
        <div style="color: var(--text-dim); font-size: 10px;">Click any workflow card to inspect.</div>
    </div>
    <div class="overlay-panel status-bar" id="status">LOADING...</div>
    <div class="overlay-panel legend">
        <div class="legend-title">Connections</div>
        <div class="legend-item"><div class="legend-swatch" style="background: var(--neon-blue);"></div> Triggers</div>
        <div class="legend-item"><div class="legend-swatch" style="background: var(--neon-purple);"></div> API call</div>
        <div class="legend-item"><div class="legend-swatch" style="background: var(--neon-orange);"></div> Hotspot link</div>
    </div>
<script>
(() => {
    let graphData = null;
    let pages = [];
    let apiGroup = null;
    let edgeData = [];
    let selectedId = null;
    let scale = 1, tx = 0, ty = 0;

    const world = document.getElementById('world');
    const viewport = document.getElementById('viewport');
    const edgeSvg = document.getElementById('edge-svg');

    window.addEventListener('message', (e) => {
        try {
            let p = e.data;
            if (Array.isArray(p)) p = p[0];
            if (!p || p.error) { showError(p?.detail || 'Unknown error'); return; }
            if (!p.graph?.nodes) { showError('Invalid graph data'); return; }
            graphData = p;
            console.log('✅ Data received', { nodes: p.graph.nodes.length, edges: p.graph.edges.length });
            buildCanvas();
        } catch (err) { console.error(err); showError(err.message); }
    });

    function showError(msg) {
        document.getElementById('loading').innerHTML =
            '<div style="color:var(--neon-red)">ERROR</div><div style="color:var(--text-secondary)">' + msg + '</div>';
    }

    function buildCanvas() {
        document.getElementById('loading').classList.add('hidden');
        const nodes = graphData.graph.nodes;
        const edges = graphData.graph.edges || [];

        // Group by page
        const pageMap = {};
        const apiWorkflows = [];
        nodes.forEach(n => {
            const d = n.data || {};
            if (d.type === 'API_WORKFLOW') { apiWorkflows.push(n); }
            else {
                const pid = d.page || '_orphan';
                if (!pageMap[pid]) pageMap[pid] = [];
                pageMap[pid].push(n);
            }
        });

        // Sort pages by workflow count descending
        const pageIds = Object.keys(pageMap).sort((a, b) => pageMap[b].length - pageMap[a].length);

        const NODE_W = 240, NODE_H = 56, NODE_GAP = 8;
        const PAGE_PAD_TOP = 52, PAGE_PAD = 20;
        const COL_GAP = 50, ROW_GAP = 50;
        const COLS = Math.min(4, Math.ceil(Math.sqrt(pageIds.length)));

        // Grid layout
        const grid = [];
        let col = 0, row = 0;
        pageIds.forEach(pid => {
            if (col >= COLS) { col = 0; row++; }
            if (!grid[row]) grid[row] = [];
            grid[row].push({
                pid,
                wfs: pageMap[pid],
                w: NODE_W + PAGE_PAD * 2,
                h: PAGE_PAD_TOP + (pageMap[pid].length * (NODE_H + NODE_GAP)) + PAGE_PAD
            });
            col++;
        });

        pages = [];
        let yOff = 60;
        grid.forEach(rowItems => {
            let xOff = 60, tallest = 0;
            rowItems.forEach(ps => {
                pages.push({ id: ps.pid, name: ps.pid, workflows: ps.wfs, x: xOff, y: yOff, w: ps.w, h: ps.h });
                xOff += ps.w + COL_GAP;
                tallest = Math.max(tallest, ps.h);
            });
            yOff += tallest + ROW_GAP;
        });

        if (apiWorkflows.length > 0) {
            apiGroup = {
                id: '_api', name: 'BACKEND / API',
                workflows: apiWorkflows, x: 60, y: yOff,
                w: NODE_W + PAGE_PAD * 2,
                h: PAGE_PAD_TOP + (apiWorkflows.length * (NODE_H + NODE_GAP)) + PAGE_PAD
            };
        }

        renderGroups();
        updateStatus();
        setupPanZoom();
        setupToolbar();
        fitView();

        // Render edges after layout settles
        setTimeout(() => renderEdges(edges), 100);
    }

    function renderGroups() {
        world.querySelectorAll('.page-group, .api-group').forEach(el => el.remove());
        const all = [...pages];
        if (apiGroup) all.push(apiGroup);

        all.forEach(pg => {
            const isApi = pg.id === '_api';
            const g = document.createElement('div');
            g.className = isApi ? 'api-group' : 'page-group';
            g.style.cssText = 'left:' + pg.x + 'px;top:' + pg.y + 'px;width:' + pg.w + 'px;min-height:' + pg.h + 'px;';
            g.innerHTML = '<div class="page-group-header"><div class="page-group-title">' +
                (isApi ? '⚡ BACKEND / API' : '📄 ' + pg.name.toUpperCase()) +
                '</div><div class="page-group-badge">' + pg.workflows.length + ' WF</div></div>';

            pg.workflows.forEach(wf => {
                const d = wf.data || {};
                const label = d.label || d.event || wf.id;
                const isHot = d.is_hotspot;
                const cls = 'wf-node' + (isHot ? (d.hotspot_score >= 4 ? ' hotspot-high' : ' hotspot') : '');

                const n = document.createElement('div');
                n.className = cls;
                n.id = 'wf-' + wf.id;
                n.dataset.wfId = wf.id;
                n.innerHTML =
                    '<div class="wf-node-header">' +
                        '<div class="wf-node-name">' + esc(label) + '</div>' +
                        '<div class="wf-node-tag ' + tagClass(d.event) + '">' + tagLabel(d.event) + '</div>' +
                    '</div>' +
                    '<div class="wf-node-meta">' + (d.action_count || 0) + ' actions' + (isHot ? ' · ⚠ hotspot' : '') + '</div>' +
                    '<div class="conn-dot left"></div><div class="conn-dot right"></div>';
                n.addEventListener('click', (ev) => { ev.stopPropagation(); selectWf(wf); });
                g.appendChild(n);
            });
            world.appendChild(g);
        });
    }

    function renderEdges(edges) {
        edgeSvg.querySelectorAll('.edge-path').forEach(el => el.remove());
        edgeData = edges;

        edges.forEach(edge => {
            const sEl = document.getElementById('wf-' + edge.source);
            const tEl = document.getElementById('wf-' + edge.target);
            if (!sEl || !tEl) return;

            const wRect = world.getBoundingClientRect();
            const sR = sEl.getBoundingClientRect();
            const tR = tEl.getBoundingClientRect();

            const x1 = (sR.right - wRect.left) / scale;
            const y1 = (sR.top + sR.height / 2 - wRect.top) / scale;
            const x2 = (tR.left - wRect.left) / scale;
            const y2 = (tR.top + tR.height / 2 - wRect.top) / scale;
            const dx = Math.abs(x2 - x1) * 0.4;

            const path = document.createElementNS('http://www.w3.org/2000/svg', 'path');
            path.setAttribute('d', 'M ' + x1 + ' ' + y1 + ' C ' + (x1+dx) + ' ' + y1 + ', ' + (x2-dx) + ' ' + y2 + ', ' + x2 + ' ' + y2);
            path.setAttribute('class', 'edge-path type-' + (edge.type || 'default'));
            path.setAttribute('marker-end', 'url(#arrowhead)');
            path.dataset.source = edge.source;
            path.dataset.target = edge.target;
            edgeSvg.appendChild(path);
        });
        console.log('✅ Rendered ' + edges.length + ' edges');
    }

    function selectWf(wf) {
        document.querySelectorAll('.wf-node.selected').forEach(el => el.classList.remove('selected'));
        selectedId = wf.id;
        const el = document.getElementById('wf-' + wf.id);
        if (el) el.classList.add('selected');
        highlightEdges(wf.id);
        updateSidebar(wf);
    }

    function highlightEdges(id) {
        document.querySelectorAll('.edge-path').forEach(p => {
            if (p.dataset.source === id || p.dataset.target === id) {
                p.classList.add('highlighted'); p.classList.remove('dimmed');
            } else {
                p.classList.remove('highlighted'); p.classList.add('dimmed');
            }
        });
    }

    function clearHighlights() {
        document.querySelectorAll('.edge-path').forEach(p => p.classList.remove('highlighted', 'dimmed'));
    }

    function updateSidebar(wf) {
        const sb = document.getElementById('sidebar');
        const d = wf.data || {};
        const isAPI = d.type === 'API_WORKFLOW';
        const label = d.label || wf.id;
        const up = edgeData.filter(e => e.target === wf.id);
        const down = edgeData.filter(e => e.source === wf.id);

        let html = '<div class="sidebar-title">WORKFLOW INSPECTOR</div>';
        html += field('Name', esc(label));
        html += '<div class="sidebar-field"><div class="sidebar-label">Type</div><div class="wf-node-tag ' + (isAPI ? 'event-api' : 'event-click') + '" style="display:inline-block;font-size:9px;padding:3px 8px;">' + (isAPI ? 'API / BACKEND' : 'PAGE WORKFLOW') + '</div></div>';
        if (d.page) html += field('Page', d.page);
        html += field('Event', d.event || 'Unknown');
        html += field('Actions', d.action_count || 0);

        if (d.is_hotspot) {
            html += '<div style="background:rgba(210,153,34,0.08);border:1px solid rgba(210,153,34,0.3);border-radius:4px;padding:10px;margin:8px 0;"><div style="color:var(--neon-orange);font-weight:700;margin-bottom:4px;">⚠ COMPLEXITY HOTSPOT</div><div style="font-size:9px;color:var(--text-secondary);">Score: ' + d.hotspot_score + '</div></div>';
        }

        html += '<hr class="sidebar-divider">';
        html += '<div class="sidebar-field"><div class="sidebar-label">Upstream (' + up.length + ' triggers this)</div>';
        if (up.length) {
            html += '<ul class="sidebar-list">' + up.map(e => {
                const src = graphData.graph.nodes.find(n => n.id === e.source);
                return '<li>' + esc(src?.data?.label || e.source) + '</li>';
            }).join('') + '</ul>';
        } else { html += '<div style="color:var(--text-dim);font-size:9px;">None</div>'; }
        html += '</div>';

        html += '<div class="sidebar-field"><div class="sidebar-label">Downstream (triggers ' + down.length + ')</div>';
        if (down.length) {
            html += '<ul class="sidebar-list">' + down.map(e => {
                const tgt = graphData.graph.nodes.find(n => n.id === e.target);
                return '<li>' + esc(tgt?.data?.label || e.target) + '</li>';
            }).join('') + '</ul>';
        } else { html += '<div style="color:var(--text-dim);font-size:9px;">None</div>'; }
        html += '</div>';

        if (down.length > 0) {
            html += '<div class="break-risk"><div style="color:var(--neon-red);font-weight:700;margin-bottom:4px;">BREAK RISK</div><div style="font-size:9px;color:var(--text-secondary);">Deleting this may break <span style="color:var(--text-primary)">' + down.length + ' downstream workflow' + (down.length > 1 ? 's' : '') + '</span>.</div></div>';
        }

        if (d.db_ops?.length) {
            html += '<hr class="sidebar-divider">';
            html += '<div class="sidebar-field"><div class="sidebar-label">Database ops</div><ul class="sidebar-list">' + d.db_ops.map(o => '<li>' + o + '</li>').join('') + '</ul></div>';
        }
        if (d.api_calls?.length) {
            html += '<div class="sidebar-field"><div class="sidebar-label">API calls</div><ul class="sidebar-list">' + d.api_calls.map(c => '<li>' + c + '</li>').join('') + '</ul></div>';
        }

        sb.innerHTML = html;
    }

    function field(label, value) {
        return '<div class="sidebar-field"><div class="sidebar-label">' + label + '</div><div class="sidebar-value">' + value + '</div></div>';
    }

    // Pan / Zoom
    function setupPanZoom() {
        let panning = false, sx, sy;
        viewport.addEventListener('pointerdown', (e) => {
            if (e.target.closest('.wf-node') || e.target.closest('.overlay-panel')) return;
            panning = true; sx = e.clientX - tx; sy = e.clientY - ty;
            viewport.setPointerCapture(e.pointerId);
        });
        viewport.addEventListener('pointermove', (e) => {
            if (!panning) return;
            tx = e.clientX - sx; ty = e.clientY - sy;
            applyTx();
        });
        viewport.addEventListener('pointerup', () => { panning = false; });
        viewport.addEventListener('wheel', (e) => {
            e.preventDefault();
            const f = e.deltaY > 0 ? 0.92 : 1.08;
            const r = viewport.getBoundingClientRect();
            const mx = e.clientX - r.left, my = e.clientY - r.top;
            tx = mx - (mx - tx) * f;
            ty = my - (my - ty) * f;
            scale *= f;
            scale = Math.max(0.1, Math.min(3, scale));
            applyTx();
            document.getElementById('btn-zoom-label').textContent = Math.round(scale * 100) + '%';
        }, { passive: false });

        viewport.addEventListener('click', (e) => {
            if (!e.target.closest('.wf-node')) {
                selectedId = null;
                document.querySelectorAll('.wf-node.selected').forEach(el => el.classList.remove('selected'));
                clearHighlights();
                document.getElementById('sidebar').innerHTML = '<div class="sidebar-title">SELECT A WORKFLOW</div><div style="color:var(--text-dim);font-size:10px;">Click any workflow card to inspect.</div>';
            }
        });
    }

    function applyTx() { world.style.transform = 'translate(' + tx + 'px,' + ty + 'px) scale(' + scale + ')'; }

    function fitView() {
        const all = [...pages]; if (apiGroup) all.push(apiGroup);
        if (!all.length) return;
        let minX = Infinity, minY = Infinity, maxX = -Infinity, maxY = -Infinity;
        all.forEach(g => {
            minX = Math.min(minX, g.x); minY = Math.min(minY, g.y);
            maxX = Math.max(maxX, g.x + g.w); maxY = Math.max(maxY, g.y + g.h);
        });
        const cw = maxX - minX, ch = maxY - minY;
        const vw = viewport.clientWidth - 350, vh = viewport.clientHeight - 80;
        scale = Math.min(vw / cw, vh / ch, 1) * 0.85;
        tx = (vw / 2) - ((minX + cw / 2) * scale) + 20;
        ty = (vh / 2) - ((minY + ch / 2) * scale) + 50;
        applyTx();
        document.getElementById('btn-zoom-label').textContent = Math.round(scale * 100) + '%';
        setTimeout(() => renderEdges(graphData.graph.edges || []), 80);
    }

    function setupToolbar() {
        document.getElementById('btn-fit').addEventListener('click', fitView);
        document.querySelectorAll('[data-mode]').forEach(btn => {
            btn.addEventListener('click', () => {
                document.querySelectorAll('[data-mode]').forEach(b => b.classList.remove('active'));
                btn.classList.add('active');
            });
        });
    }

    function updateStatus() {
        const n = graphData.graph.nodes, e = graphData.graph.edges || [];
        const h = n.filter(x => x.data?.is_hotspot).length;
        document.getElementById('status').innerHTML =
            'PAGES: <span>' + pages.length + '</span> | WORKFLOWS: <span>' + n.length + '</span> | EDGES: <span>' + e.length + '</span> | HOTSPOTS: <span style="color:var(--neon-orange)">' + h + '</span>';
    }

    function esc(t) { return String(t).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }
    function tagClass(ev) {
        const e = (ev||'').toLowerCase();
        if (e.includes('click')) return 'event-click';
        if (e.includes('pageload') || e.includes('page is loaded')) return 'event-page';
        if (e.includes('input') || e.includes('change')) return 'event-input';
        if (e.includes('condition')) return 'event-condition';
        if (e.includes('logout')) return 'event-logout';
        if (e.includes('api')) return 'event-api';
        return 'event-default';
    }
    function tagLabel(ev) {
        const e = (ev||'').toLowerCase();
        if (e.includes('click')) return 'CLICK';
        if (e.includes('pageload') || e.includes('page is loaded')) return 'LOAD';
        if (e.includes('input') || e.includes('change')) return 'INPUT';
        if (e.includes('condition')) return 'COND';
        if (e.includes('logout')) return 'LOGOUT';
        if (e.includes('api')) return 'API';
        return 'EVENT';
    }
})();
</script>
</body>
</html>
